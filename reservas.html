<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reservas.css">
</head>
<body>

    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">LUNA & LÚPULO</a>
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="galeria.html">Galería</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="reservas.html" class="active">Reservas</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-padding">
        <section class="container">
            <h1 class="section-title">Reserva tu Mesa</h1>
            <form class="reserva-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora">Hora</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="personas">Número de personas</label>
                    <select id="personas">
                        <option value="2">2 Personas</option>
                        <option value="4">4 Personas</option>
                        <option value="6">6 Personas</option>
                        <option value="8">Más de 8</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Confirmar Reserva</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-info">
                <h3>Luna & Lúpulo</h3>
                <p>Av. José de la Riva-Agüero 123, Comas, Lima</p>
            </div>
            <div class="footer-links">
                <p class="copy">&copy; 2026 Luna & Lúpulo. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

        }
    </script>

</body>
</html>
